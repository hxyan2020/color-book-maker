name: color-book-maker
region: sgp

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: hxyan2020/color-book-maker
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    routes:
      - path: /
    envs:
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_VISION_MODEL
        scope: RUN_TIME
        value: gemini-2.5-flash
      - key: GEMINI_IMAGE_MODEL
        scope: RUN_TIME
        value: gemini-3.1-flash-image
    health_check:
      http_path: /
      initial_delay_seconds: 90
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
